name: Publish Registry

on:
    push:
        branches:
            - main
            - master
    workflow_dispatch:

permissions:
    contents: write

jobs:
    publish:
        runs-on: ubuntu-latest
        env:
            TZ: Europe/Prague
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            # Set to 'true' to allow the workflow to push updates to the registry branch
            PUSH_REGISTRY: "true"
            # Set to 'true' to override whole branch with generated content (keeps just one commit history)
            OVERRIDE_BRANCH: "false"
            # Default registry repo URL; derived from the current repository
            REGISTRY_GIT_URL: https://github.com/${{ github.repository }}.git
        steps:
            - name: Checkout repository
              uses: actions/checkout@v5
              with:
                  fetch-depth: 1 # Only HEAD: publish current package state once, not replay every commit

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "24.x"

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Configure global pnpm hook to force TypeScript 5
              run: |
                  mkdir -p "$HOME/.pnpm-hooks"
                  cat << 'EOF' > "$HOME/.pnpm-hooks/.pnpmfile.cjs"
                  module.exports = {
                    hooks: {
                      readPackage(pkg) {
                        if (pkg.dependencies && pkg.dependencies.typescript) {
                          pkg.dependencies.typescript = '^5.5.0';
                        }
                        if (pkg.devDependencies && pkg.devDependencies.typescript) {
                          pkg.devDependencies.typescript = '^5.5.0';
                        }
                        return pkg;
                      }
                    }
                  }
                  EOF
                  pnpm config set global-pnpmfile "$HOME/.pnpm-hooks/.pnpmfile.cjs"

            - name: Configure command PATH
              run: |
                  echo "PNPM_HOME=$HOME/.local/share/pnpm" >> "$GITHUB_ENV"
                  mkdir -p "$HOME/.local/share/pnpm/bin"
                  echo "$HOME/.local/share/pnpm/bin" >> "$GITHUB_PATH"
                  pnpm config set global-bin-dir "$HOME/.local/share/pnpm/bin"

            - name: Get pnpm store directory
              id: pnpm-cache
              shell: bash
              run: |
                  echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

            - name: Setup pnpm cache
              uses: actions/cache@v4
              with:
                  path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
                  key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
                  restore-keys: |
                      ${{ runner.os }}-pnpm-store-

            - name: Install dependencies
              run: pnpm install --no-frozen-lockfile

            - name: Checkout Jaculus-tools
              run: |
                  git clone https://github.com/jaculus-org/Jaculus-tools.git --branch master ../Jaculus-tools
                  cd ../Jaculus-tools
                  pnpm install --no-frozen-lockfile
                  pnpm build
                  cd packages/tools
                  pnpm add -g .

            - name: Clone and Build Registry Tool
              run: |
                  git clone https://github.com/jaculus-org/Jaculus-registry.git ../jaculus-registry
                  cd ../jaculus-registry
                  pnpm install --no-frozen-lockfile
                  # Link local jaculus packages (if any) from the previously cloned Jaculus-tools
                  for pkg in ../Jaculus-tools/packages/*; do
                    if [ -f "$pkg/package.json" ]; then
                      echo "Linking local package: $pkg"
                      pnpm link "$pkg" || true
                    fi
                  done
                  pnpm build

            - name: Clone target registry repo (dist)
              run: |
                  git clone $REGISTRY_GIT_URL ../jaculus-registry-dist
                  cd ../jaculus-registry-dist
                  git fetch --all
                  git checkout registry || git checkout -b registry
                  cd -

            - name: Determine changed packages
              run: |
                  set -uo pipefail
                  CACHE_FILE="../jaculus-registry-dist/.cache/registry-cache.json"
                  LAST_SHA=""
                  [ -f "$CACHE_FILE" ] && LAST_SHA=$(jq -r '.lastProcessedCommit // ""' "$CACHE_FILE")

                  BUILD_ALL=0
                  PACKAGES=""

                  if [ -z "$LAST_SHA" ]; then
                    echo "No last-published commit recorded -> building all packages."
                    BUILD_ALL=1
                  elif ! git fetch --depth=1 origin "$LAST_SHA" 2>/dev/null || ! git cat-file -e "${LAST_SHA}^{commit}" 2>/dev/null; then
                    echo "Last-published commit $LAST_SHA not fetchable -> building all packages."
                    BUILD_ALL=1
                  else
                    echo "Diffing ${LAST_SHA}..HEAD"
                    CHANGED_FILES=$(git diff --name-only "$LAST_SHA" HEAD)
                    echo "Changed files:"; echo "$CHANGED_FILES"

                    # Workspace-wide files affect every package -> full rebuild
                    if echo "$CHANGED_FILES" | grep -qE '^(package\.json|pnpm-lock\.yaml|pnpm-workspace\.yaml|tsconfig[^/]*\.json|@types/jaculus/)'; then
                      echo "Shared workspace file changed -> building all packages."
                      BUILD_ALL=1
                    else
                      # Map each changed file to its package id (dir name, or @scope/name); keep only real packages
                      PACKAGES=$(echo "$CHANGED_FILES" | awk -F/ '
                        /^@[^/]+\// { print $1"/"$2; next }
                        /\// { print $1 }
                      ' | sort -u | while read -r id; do
                        [ -n "$id" ] && [ -f "$id/package.json" ] && echo "$id"
                      done | paste -sd, - || true)
                      [ -z "$PACKAGES" ] && echo "No package sources changed -> nothing to rebuild." || echo "Changed packages: $PACKAGES"
                    fi
                  fi

                  echo "BUILD_ALL=$BUILD_ALL" >> "$GITHUB_ENV"
                  echo "PACKAGES=$PACKAGES" >> "$GITHUB_ENV"

            - name: Start local registry server
              run: |
                  node ../jaculus-registry/bin/jaculus-registry.js serve "$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/../jaculus-registry-dist" &
                  echo "REGISTRY_PID=$!" >> $GITHUB_ENV
                  # Wait for server to be ready
                  for i in $(seq 1 10); do
                    if curl -sf http://127.0.0.1:3737/; then
                      exit 0
                    fi
                    sleep 1
                  done
                  echo "Registry server did not become ready in time" >&2
                  exit 1

            - name: Generate registry
              run: |
                  SRC="$GITHUB_WORKSPACE"
                  DIST="$GITHUB_WORKSPACE/../jaculus-registry-dist"
                  if [ "${BUILD_ALL:-0}" = "1" ]; then
                    echo "Building all packages."
                    node ../jaculus-registry/bin/jaculus-registry.js generate --force-rebuild-all "$SRC" "$DIST"
                  elif [ -n "${PACKAGES:-}" ]; then
                    echo "Building changed packages: $PACKAGES"
                    node ../jaculus-registry/bin/jaculus-registry.js generate --force-rebuild-all --packages "$PACKAGES" "$SRC" "$DIST"
                  else
                    echo "No package changes; skipping registry generation."
                  fi

            - name: Stop local registry server
              if: always()
              run: |
                  if [ -n "${REGISTRY_PID:-}" ]; then
                    kill "$REGISTRY_PID" || true
                  fi

            - name: Copy dist to accessible location
              run: |
                  mkdir -p jaculus-registry-artifact
                  cp -r ../jaculus-registry-dist/* jaculus-registry-artifact/

            - name: Upload registry dist artifact
              uses: actions/upload-artifact@v7
              with:
                  name: registry-dist
                  path: jaculus-registry-artifact/

            - name: Push registry branch (optional)
              if: ${{ env.PUSH_REGISTRY == 'true' }}
              run: |
                  set -euo pipefail
                  cd ../jaculus-registry-dist

                  # Configure git (email is optional - GitHub Actions provides defaults)
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  # Set up authentication
                  git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
                  git checkout registry || git checkout -b registry

                  # If OVERRIDE_BRANCH is enabled, reset to single commit, otherwise just add commit
                  if [ "${{ env.OVERRIDE_BRANCH }}" = "true" ]; then
                    # Remove all history and keep only current state
                    git add -A
                    git commit --allow-empty -m "Update registry via GitHub Actions (${GITHUB_SHA})"
                    git reset --soft $(git rev-list --max-parents=0 HEAD)
                    git commit --amend -m "Registry build from ${GITHUB_SHA}"
                    git push --force origin registry
                  else
                    # Regular commit and push
                    git add -A
                    git commit -m "Update registry via GitHub Actions (${GITHUB_SHA})" || echo "No changes to commit"
                    git push origin registry
                  fi
